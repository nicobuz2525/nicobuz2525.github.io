<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Buzzanca STORE</h1>
        <nav>
            <ul class="menu-destra">
                <li><a href="pagina1.html">Home</a></li>
                <li><a href="index.html#prodotti">Prodotti</a></li>
                <li><a href="index.html#contatti">Contatti</a></li>
            </ul>
        </nav>
    </header>

    <section id="login">
        <h2>Accedi al tuo account</h2>
        <form action="#" method="post">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Accedi</button>
        </form>
        <p>Non hai un account? <a href="register.html">Registrati</a></p>
    </section>
</body>

</html>
