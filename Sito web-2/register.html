<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Buzzanca STORE</h1>
        <nav>
            <ul class="menu-destra">
                <li><a href="pagina1.html">Home</a></li>
                <li><a href="index.html#prodotti">Prodotti</a></li>
                <li><a href="index.html#contatti">Contatti</a></li>
            </ul>
        </nav>
    </header>

    <section id="register">
        <h2>Crea un nuovo account</h2>
        <form action="#" method="post">
            <label for="name">Nome:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <label for="confirm-password">Conferma Password:</label>
            <input type="password" id="confirm-password" name="confirm-password" required>
            <button type="submit">Registrati</button>
        </form>
        <p>Hai già un account? <a href="login.html">Accedi</a></p>
    </section>
</body>

</html>
